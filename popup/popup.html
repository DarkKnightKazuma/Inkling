<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>灵犀摘</title>
</head>
<body>
  <!-- ── 头部 ── -->
  <header class="header">
    <div class="header-top">
      <h1 class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        灵犀摘
      </h1>
      <div class="header-actions">
        <button id="btn-select-mode" class="icon-btn" title="多选模式">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </button>
        <button id="btn-export" class="icon-btn" title="导出 Markdown">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="search-box">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="搜索金句、笔记或标签...">
    </div>
  </header>

  <!-- ── 收藏夹 ── -->
  <div class="collections-bar">
    <div class="collections-scroll" id="collections-tabs"></div>
    <button class="col-add-btn" id="btn-add-collection" title="新建收藏夹">+</button>
  </div>

  <!-- ── 筛选栏 ── -->
  <div class="filter-bar">
    <button class="filter-trigger" id="date-trigger" title="按日期筛选">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span id="date-label">全部时间</span>
    </button>
    <select id="filter-color" class="filter-select" title="按颜色">
      <option value="all">全部颜色</option>
      <option value="yellow">🟡 黄色</option>
      <option value="green">🟢 绿色</option>
      <option value="blue">🔵 蓝色</option>
      <option value="pink">🩷 粉色</option>
      <option value="purple">🟣 紫色</option>
    </select>
    <select id="filter-site" class="filter-select" title="按网站">
      <option value="all">全部网站</option>
    </select>
  </div>

  <!-- ── 日期选择面板 ── -->
  <div class="date-panel" id="date-panel" style="display:none">
    <div class="date-presets">
      <button class="date-preset active" data-preset="all">全部</button>
      <button class="date-preset" data-preset="today">今天</button>
      <button class="date-preset" data-preset="week">近7天</button>
      <button class="date-preset" data-preset="month">近30天</button>
      <button class="date-preset" data-preset="custom">自定义</button>
    </div>
    <div class="date-range-row" id="date-range-row" style="display:none">
      <label class="date-field">
        <span>从</span>
        <input type="date" id="date-from">
      </label>
      <span class="date-sep">—</span>
      <label class="date-field">
        <span>到</span>
        <input type="date" id="date-to">
      </label>
    </div>
  </div>

  <!-- ── 统计 & 全选 ── -->
  <div class="toolbar-row">
    <div class="select-all-area" id="select-all-area" style="display:none">
      <label class="checkbox-label"><input type="checkbox" id="cb-select-all"> 全选</label>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <!-- ── 列表 ── -->
  <main class="main">
    <div id="highlight-list" class="highlight-list"></div>
    <div id="empty-state" class="empty-state" style="display:none">
      <svg class="empty-icon" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      <p class="empty-title">还没有收藏的金句</p>
      <p class="empty-desc">在网页上选中文字，点击"收藏"即可开始</p>
    </div>
  </main>

  <!-- ── 批量操作栏 ── -->
  <div class="batch-bar" id="batch-bar" style="display:none">
    <span class="batch-count" id="batch-count">已选 0 条</span>
    <div class="batch-actions">
      <button class="batch-btn" id="batch-copy" title="批量复制">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        复制
      </button>
      <button class="batch-btn" id="batch-move" title="移动到收藏夹">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        移动
      </button>
      <button class="batch-btn" id="batch-export" title="导出选中为 Markdown">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导出
      </button>
      <button class="batch-btn danger" id="batch-delete" title="批量删除">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        删除
      </button>
    </div>
  </div>

  <!-- ── 模态对话框 ── -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-title" id="modal-title"></div>
      <input type="text" class="modal-input" id="modal-input" style="display:none">
      <div class="modal-msg" id="modal-msg" style="display:none"></div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="modal-cancel">取消</button>
        <button class="modal-btn confirm" id="modal-confirm">确定</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
